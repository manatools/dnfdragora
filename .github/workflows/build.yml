name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        container:
          - 'registry.fedoraproject.org/fedora:latest'
          - 'registry.fedoraproject.org/fedora:rawhide'
          - 'docker.io/library/mageia:cauldron'
      fail-fast: false

    container:
      image: ${{ matrix.container }}

    steps:
      - name: Refresh dnf metadata (Mageia only)
        if: startsWith(matrix.container, 'docker.io/library/mageia:')
        run: |
          dnf clean all
          dnf --refresh -y makecache
      - run: dnf --assumeyes install
              --refresh
              /usr/bin/cmake
              /usr/bin/msgmerge
              /usr/bin/msgfmt
              /usr/bin/python3
              /usr/bin/sphinx-build-3
              python3-manatools
              python3-setuptools
              python3-libdnf5
              python3-yaml
              python3-pyxdg
              python3-cairosvg              
              git-core
      - uses: actions/checkout@v4
      - name: Configure CMake
        run: cmake -S . -B github-build
      - name: Build
        run: cmake --build github-build
